<!DOCTYPE html>
<html>
<body>
    <h2>Blackstax Testing Interface</h2>
    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="wallet"></p>

    <h3>1. Approve BLX</h3>
    <button onclick="approveTokens()">Approve 100 BLX</button>

    <h3>2. Stake BLX</h3>
    <button onclick="stakeTokens()">Stake 100 BLX</button>

    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script>
        const proxyAddress = "0xc43b35712b32c44b390059e42538e817c7efb6ef";
        const tokenAddress = "0x0C978102175c6b9f90Dd53b249C1E5EdbF82DC3A";
        
        // Human Readable ABIs
        const tokenABI = ["function approve(address spender, uint256 amount) returns (bool)"];
        const mlmABI = ["function stake(uint256 amount, bool withBurn, address referrer)"];

        async function connectWallet() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('wallet').innerText = "Connected: " + accounts[0];
            } else {
                alert("MetaMask not found!");
            }
        }

        async function approveTokens() {
            const web3 = new Web3(window.ethereum);
            const tokenContract = new web3.eth.Contract(tokenABI, tokenAddress);
            await tokenContract.methods.approve(proxyAddress, "100000000000000000000").send({ from: ethereum.selectedAddress });
            alert("Approval Success!");
        }

        async function stakeTokens() {
            const web3 = new Web3(window.ethereum);
            const mlmContract = new web3.eth.Contract(mlmABI, proxyAddress);
            // Stake with 100 BLX, withBurn=true, and empty referrer
            await mlmContract.methods.stake("100000000000000000000", true, "0x0000000000000000000000000000000000000000").send({ from: ethereum.selectedAddress });
            alert("Stake Successful!");
        }
    </script>
</body>
</html>
